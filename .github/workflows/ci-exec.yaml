name: 'CI - Testes'

on:
  workflow_dispatch:
  schedule:
    - cron: '*/05 * * * *'
  push:
    branches: [ main ]

jobs:
  mocha-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Instalar dependências
        run: npm ci

      - name: Criar pasta de relatórios
        run: mkdir -p reports

      - name: Executar testes Mocha (CI)
        run: npm run test:ci
        continue-on-error: true

      - name: Salvar relatórios como Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports
          path: reports
